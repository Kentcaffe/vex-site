# Render Blueprint — setează Build Command dacă nu folosești YAML din dashboard.
# În Environment: DATABASE_URL, DIRECT_URL, AUTH_SECRET, NEXT_PUBLIC_APP_URL.
services:
  - type: web
    name: anunturi-web
    runtime: node
    # Migrarea rulează la build; la start pornește doar Next.js (deschide PORT rapid).
    buildCommand: npm ci && npm run build:render
    startCommand: npm run start:render
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_PRICE_CURRENCY
        value: MDL
