# Render Blueprint — setează Build Command dacă nu folosești YAML din dashboard.
# În Environment: DATABASE_URL, DIRECT_URL, AUTH_SECRET, NEXT_PUBLIC_APP_URL, AUTH_URL.
services:
  - type: web
    name: anunturi-web
    runtime: node
    # `npm ci` rulează postinstall (prisma generate), apoi `next build` (vezi scriptul `build`).
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: AUTH_URL
        sync: false
      - key: NEXT_PUBLIC_PRICE_CURRENCY
        value: MDL
