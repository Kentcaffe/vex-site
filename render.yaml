# Render Blueprint — setează Build Command dacă nu folosești YAML din dashboard.
# În Environment: DATABASE_URL, DIRECT_URL, NEXT_PUBLIC_APP_URL, AUTH_URL, NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY.
services:
  - type: web
    name: anunturi-web
    runtime: node
    # `build` include `migrate:deploy` — același flux ca în dashboard: `npm ci && npm run build`
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: AUTH_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_PRICE_CURRENCY
        value: MDL
